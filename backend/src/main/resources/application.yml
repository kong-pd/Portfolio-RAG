server:
  port: 8080

spring:
  application:
    name: portfolio-rag
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:5432/${POSTGRES_DB:ragdb}
    username: ${POSTGRES_USER:raguser}
    password: ${POSTGRES_PASSWORD:changeme}
    driver-class-name: org.postgresql.Driver
    hikari:
      data-source-properties:
        # Lets the pg driver send untyped strings so they can be implicitly
        # cast to non-varchar columns (vector(768), jsonb).
        stringtype: unspecified
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 22MB
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

management:
  endpoints:
    web:
      exposure:
        include: health

# Application-specific settings
app:
  jwt:
    secret: ${JWT_SECRET:change-this-to-a-256-bit-secret-in-production}
    access-token-ttl: 15m
    refresh-token-ttl: 7d
  rag:
    chunk-size: 512
    chunk-overlap: 64
    top-k: 5
    similarity-threshold: 0.55
  ai:
    chat:
      # Tried in order at runtime; first success wins, the rest are fallbacks.
      providers:
        - groq
        - gemini
    embedding:
      # Fixed at deploy time. Switching provider/dimensions requires re-embedding
      # all documents and a matching DB vector(N) column.
      provider: gemini
      dimensions: 768
    openai:
      api-key: ${OPENAI_API_KEY:}
      chat-model: gpt-4o
      embedding-model: text-embedding-3-small
    groq:
      api-key: ${GROQ_API_KEY:}
      chat-model: llama-3.3-70b-versatile
      base-url: https://api.groq.com/openai
    gemini:
      api-key: ${GOOGLE_API_KEY:}
      base-url: https://generativelanguage.googleapis.com/v1beta/openai
      chat-model: gemini-2.0-flash
      embedding-model: gemini-embedding-001  # native 3072-dim, truncated to 768 via dimensions param
