server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA history mode fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy API calls to the backend container
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;

        # Allow document uploads up to the backend's multipart limit (20MB file
        # / 22MB request). The nginx default of 1MB otherwise rejects uploads
        # with a 413 before they ever reach the backend.
        client_max_body_size 25m;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE streaming support (fetch + ReadableStream)
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_set_header Connection '';
        chunked_transfer_encoding on;
    }
}
